 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CI/CD Memory Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <header>
    <div class="logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">CI/CD<em>Match</em></span>
    </div>
    <div class="header-tag">Pipeline Knowledge Game</div>
  </header>

  <main>
    <section class="hero">
      <h1>Deploy<br/><span class="h1-accent">Your Memory</span></h1>
      <p class="hero-sub">Match CI/CD terms to their definitions. 9 pairs across 4 pipeline stages.</p>
    </section>

    <div class="stats-bar">
      <div class="stat-pill">
        <span class="stat-label">Moves</span>
        <span class="stat-value" id="s-moves">0</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Pairs</span>
        <span class="stat-value" id="s-pairs">0<small>/9</small></span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="s-time">0:00</span>
      </div>
      <button id="restart-btn" onclick="initGame()">↺ Restart</button>
    </div>

    <div id="msg-bar">
      <span id="msg-text">Flip two cards — find the matching pair</span>
    </div>

    <div id="board"></div>

    <div id="win-screen" class="hidden">
      <div class="win-inner">
        <div class="win-icon">🚀</div>
        <h2>Pipeline Complete!</h2>
        <p id="win-detail"></p>
        <button onclick="initGame()">Run Again</button>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="dot dot-source"></span>Source</div>
      <div class="legend-item"><span class="dot dot-build"></span>Build</div>
      <div class="legend-item"><span class="dot dot-test"></span>Test</div>
      <div class="legend-item"><span class="dot dot-deploy"></span>Deploy</div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
